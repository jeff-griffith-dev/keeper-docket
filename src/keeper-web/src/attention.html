<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keeper — My Attention</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:           #0e0f11;
      --bg-surface:   #16181c;
      --bg-raised:    #1e2127;
      --bg-hover:     #252830;
      --border:       #2a2d35;
      --border-light: #343840;

      --text-primary:   #e8eaed;
      --text-secondary: #8b909a;
      --text-muted:     #555a66;

      --overdue:    #e05252;
      --overdue-bg: #1f1214;
      --due-soon:   #e09052;
      --due-soon-bg:#1a1510;
      --on-track:   #52a882;
      --on-track-bg:#0f1a15;
      --no-date:    #6b7280;

      --accent:     #4a9eff;
      --accent-dim: #1a3a5c;

      --font-sans: 'IBM Plex Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --radius:    4px;
      --radius-lg: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
    }
    button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }

    .shell {
      display: grid;
      grid-template-columns: 220px 1fr;
      grid-template-rows: 48px 1fr;
      min-height: 100vh;
    }

    /* ── Top bar ────────────────────────────────────────────────── */
    .topbar {
      grid-column: 1 / -1;
      display: flex; align-items: center;
      padding: 0 20px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      gap: 16px;
    }
    .topbar-logo {
      font-family: var(--font-mono); font-size: 13px; font-weight: 500;
      letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase;
    }
    .topbar-logo span { color: var(--text-muted); font-weight: 400; }
    .topbar-sep { width: 1px; height: 20px; background: var(--border); }
    .topbar-context { font-size: 12px; color: var(--text-secondary); font-family: var(--font-mono); }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .topbar-user { font-size: 12px; color: var(--text-secondary); }
    .topbar-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent-dim); border: 1px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-size: 11px; color: var(--accent); font-weight: 500;
    }

    /* ── Sidebar ────────────────────────────────────────────────── */
    .sidebar {
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      padding: 16px 0;
      display: flex; flex-direction: column; gap: 4px;
    }
    .nav-section {
      padding: 8px 16px 4px;
      font-family: var(--font-mono); font-size: 10px;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted);
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 16px; font-size: 13px; color: var(--text-secondary);
      cursor: pointer; transition: background 0.1s, color 0.1s;
      border-left: 2px solid transparent; text-decoration: none;
    }
    .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .nav-item.active { color: var(--text-primary); border-left-color: var(--accent); background: var(--bg-hover); }
    .nav-icon { font-size: 14px; width: 16px; text-align: center; flex-shrink: 0; }
    .nav-badge {
      margin-left: auto; font-family: var(--font-mono); font-size: 10px;
      padding: 1px 6px; border-radius: 10px;
      background: var(--overdue); color: white; font-weight: 500;
    }
    .nav-badge.warn { background: var(--due-soon); }
    .nav-badge.neutral { background: var(--bg-raised); color: var(--text-muted); border: 1px solid var(--border); }
    .sidebar-footer { margin-top: auto; padding: 12px 16px; border-top: 1px solid var(--border); }
    .sidebar-footer-text { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); line-height: 1.6; }

    /* ── Main ───────────────────────────────────────────────────── */
    .main { overflow-y: auto; padding: 24px 28px; display: flex; flex-direction: column; gap: 24px; }

    .page-header { display: flex; align-items: baseline; gap: 16px; }
    .page-title { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
    .page-subtitle { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }
    .page-actions { margin-left: auto; display: flex; gap: 8px; }
    .btn {
      padding: 6px 14px; border-radius: var(--radius);
      font-size: 12px; font-weight: 500; transition: all 0.1s;
    }
    .btn-ghost { color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-light); }

    /* ── Summary strip ──────────────────────────────────────────── */
    .summary-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .summary-card {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 14px 16px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .summary-card.alert { border-color: var(--overdue); background: var(--overdue-bg); }
    .summary-card.warn  { border-color: var(--due-soon); background: var(--due-soon-bg); }
    .summary-value { font-family: var(--font-mono); font-size: 28px; font-weight: 500; line-height: 1; }
    .summary-card.alert .summary-value { color: var(--overdue); }
    .summary-card.warn  .summary-value { color: var(--due-soon); }
    .summary-card:not(.alert):not(.warn) .summary-value { color: var(--text-primary); }
    .summary-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-family: var(--font-mono); }

    /* ── Item groups ────────────────────────────────────────────── */
    .item-group { display: flex; flex-direction: column; gap: 0; }
    .group-header { display: flex; align-items: center; gap: 10px; padding: 8px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 2px; }
    .group-label { font-family: var(--font-mono); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; }
    .group-label.overdue  { color: var(--overdue); }
    .group-label.due-soon { color: var(--due-soon); }
    .group-label.on-track { color: var(--on-track); }
    .group-label.no-date  { color: var(--no-date); }
    .group-count { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }

    /* ── Item row ───────────────────────────────────────────────── */
    .item-row {
      display: grid;
      grid-template-columns: 20px 1fr auto auto auto;
      align-items: center; gap: 12px;
      padding: 9px 8px; border-radius: var(--radius);
      cursor: pointer; transition: background 0.1s;
      animation: fadeIn 0.2s ease both;
    }
    .item-row:hover { background: var(--bg-hover); }
    .item-row.overdue { background: var(--overdue-bg); }
    .item-row.overdue:hover { background: #271519; }

    .item-indicator { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; justify-self: center; }
    .item-indicator.overdue  { background: var(--overdue); }
    .item-indicator.due-soon { background: var(--due-soon); }
    .item-indicator.on-track { background: var(--on-track); }
    .item-indicator.no-date  { background: var(--no-date); }

    .item-body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .item-title { font-size: 13px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-meta { display: flex; align-items: center; gap: 8px; }
    .item-series { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
    .item-topic  { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
    .meta-sep { color: var(--border-light); font-size: 10px; }

    .item-absentia {
      font-family: var(--font-mono); font-size: 10px;
      padding: 1px 6px; border-radius: 2px;
      background: var(--bg-raised); color: var(--text-muted);
      border: 1px solid var(--border); white-space: nowrap;
    }

    .item-due { font-family: var(--font-mono); font-size: 11px; white-space: nowrap; text-align: right; }
    .item-due.overdue  { color: var(--overdue); font-weight: 500; }
    .item-due.due-soon { color: var(--due-soon); }
    .item-due.on-track { color: var(--text-muted); }
    .item-due.no-date  { color: var(--text-muted); }

    .item-priority { font-family: var(--font-mono); font-size: 10px; padding: 2px 6px; border-radius: 2px; white-space: nowrap; }
    .priority-4 { background: #2a1010; color: var(--overdue);  border: 1px solid #3a1515; }
    .priority-3 { background: #1f1810; color: var(--due-soon); border: 1px solid #2e2210; }
    .priority-2 { background: var(--bg-raised); color: var(--text-muted); border: 1px solid var(--border); }
    .priority-1 { background: var(--bg-raised); color: var(--text-muted); border: 1px solid var(--border); }

    .item-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.1s; }
    .item-row:hover .item-actions { opacity: 1; }
    .item-action-btn {
      padding: 3px 8px; border-radius: var(--radius);
      font-size: 11px; font-family: var(--font-mono);
      border: 1px solid var(--border); color: var(--text-secondary);
      background: var(--bg-surface); transition: all 0.1s;
    }
    .item-action-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .item-action-btn.done:hover { border-color: var(--on-track); color: var(--on-track); background: var(--on-track-bg); }

    /* ── Context menu ───────────────────────────────────────────── */
    .context-menu {
      position: fixed; background: var(--bg-raised);
      border: 1px solid var(--border-light); border-radius: var(--radius-lg);
      padding: 4px; min-width: 180px; z-index: 1000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4); display: none;
    }
    .context-menu.visible { display: block; }
    .ctx-section { padding: 4px 8px 2px; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
    .ctx-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: var(--radius); font-size: 12px; color: var(--text-secondary); cursor: pointer; transition: background 0.1s, color 0.1s; }
    .ctx-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .ctx-item.destructive { color: var(--overdue); }
    .ctx-item.destructive:hover { background: var(--overdue-bg); }
    .ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }
    .ctx-icon { font-size: 13px; width: 16px; text-align: center; }

    /* ── Loading / error / empty states ────────────────────────── */
    .state-message {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 20px; gap: 12px;
      color: var(--text-muted);
    }
    .state-icon { font-size: 32px; opacity: 0.4; }
    .state-text { font-size: 13px; font-family: var(--font-mono); }
    .state-text.error { color: var(--overdue); opacity: 0.8; }

    /* ── Scrollbar ──────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
<div class="shell">

  <header class="topbar">
    <div class="topbar-logo">KEEPER <span>/ docket</span></div>
    <div class="topbar-sep"></div>
    <div class="topbar-context">my attention</div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-user">—</span>
      <div class="topbar-avatar" id="topbar-avatar">—</div>
    </div>
  </header>

  <nav class="sidebar">
    <div class="nav-section">Workspace</div>
    <a class="nav-item active" href="/app/attention">
      <span class="nav-icon">⊙</span>My Attention
      <span class="nav-badge" id="nav-overdue-badge" style="display:none">0</span>
    </a>
    <a class="nav-item" href="/app/series">
      <span class="nav-icon">◫</span>Series
      <span class="nav-badge neutral" id="nav-series-badge">—</span>
    </a>
    <div class="nav-section">Quick Access</div>
    <a class="nav-item" href="/app/attention">
      <span class="nav-icon">◈</span>All My Items
      <span class="nav-badge warn" id="nav-open-badge" style="display:none">0</span>
    </a>
    <div class="nav-section">Actions</div>
    <a class="nav-item" href="/app/series">
      <span class="nav-icon">+</span>New Series
    </a>
    <div class="sidebar-footer">
      <div class="sidebar-footer-text" id="sidebar-status">
        keeper v0.1.0<br>connecting…
      </div>
    </div>
  </nav>

  <main class="main" id="main">

    <div class="page-header">
      <h1 class="page-title">My Attention</h1>
      <span class="page-subtitle" id="page-clock"></span>
      <div class="page-actions">
        <button class="btn btn-ghost" onclick="loadItems()">↻ Refresh</button>
      </div>
    </div>

    <!-- Summary strip -->
    <div class="summary-strip">
      <div class="summary-card alert" id="card-overdue">
        <span class="summary-value" id="count-overdue">—</span>
        <span class="summary-label">Overdue</span>
      </div>
      <div class="summary-card warn" id="card-due-soon">
        <span class="summary-value" id="count-due-soon">—</span>
        <span class="summary-label">Due this week</span>
      </div>
      <div class="summary-card">
        <span class="summary-value" id="count-open">—</span>
        <span class="summary-label">Open items</span>
      </div>
      <div class="summary-card">
        <span class="summary-value" id="count-series">—</span>
        <span class="summary-label">Active series</span>
      </div>
    </div>

    <!-- Item list — rendered by JS -->
    <div id="item-list"></div>

  </main>
</div>

<!-- Context menu -->
<div class="context-menu" id="context-menu">
  <div class="ctx-section">Actions</div>
  <div class="ctx-item" onclick="ctxAction('done')"><span class="ctx-icon">✓</span> Mark done</div>
  <div class="ctx-item" onclick="ctxAction('defer')"><span class="ctx-icon">→</span> Defer</div>
  <div class="ctx-item" onclick="ctxAction('note')"><span class="ctx-icon">✎</span> Add note</div>
  <div class="ctx-sep"></div>
  <div class="ctx-section">Navigate</div>
  <div class="ctx-item" onclick="ctxAction('open')"><span class="ctx-icon">⊞</span> Open item</div>
  <div class="ctx-item" onclick="ctxAction('meeting')"><span class="ctx-icon">◫</span> Go to meeting</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item destructive" onclick="ctxAction('abandon')"><span class="ctx-icon">✕</span> Abandon</div>
</div>

<script>
  // ── Config ─────────────────────────────────────────────────────
  const API      = '/api';
  const USER_ID  = '00000000-0000-0000-0000-000000000001';
  const TODAY    = new Date();
  TODAY.setHours(0, 0, 0, 0);

  // ── State ──────────────────────────────────────────────────────
  let allItems   = [];
  let activeItem = null;

  // ── Boot ───────────────────────────────────────────────────────
  updateClock();
  setInterval(updateClock, 60000);
  loadUser();
  loadItems();
  loadSeriesCount();

  // ── Clock ──────────────────────────────────────────────────────
  function updateClock() {
    const d = new Date();
    const days   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const h = String(d.getHours()).padStart(2,'0');
    const m = String(d.getMinutes()).padStart(2,'0');
    document.getElementById('page-clock').textContent =
      `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()} · ${h}:${m}`;
  }

  // ── Load current user ──────────────────────────────────────────
  async function loadUser() {
    try {
      const r = await fetch(`${API}/users/${USER_ID}`);
      if (!r.ok) return;
      const u = await r.json();
      const initials = u.displayName
        .split(' ')
        .map(w => w[0])
        .join('')
        .toUpperCase()
        .slice(0, 2);
      document.getElementById('topbar-user').textContent = u.displayName;
      document.getElementById('topbar-avatar').textContent = initials;
      document.getElementById('sidebar-status').innerHTML =
        `keeper v0.1.0<br>docket api · connected`;
    } catch {
      document.getElementById('sidebar-status').innerHTML =
        `keeper v0.1.0<br><span style="color:var(--overdue)">docket api · error</span>`;
    }
  }

  // ── Load series count for sidebar badge ───────────────────────
  async function loadSeriesCount() {
    try {
      const r = await fetch(`${API}/series`);
      if (!r.ok) return;
      const series = await r.json();
      document.getElementById('nav-series-badge').textContent = series.length;
      document.getElementById('count-series').textContent = series.length;
    } catch { /* silent */ }
  }

  // ── Load open items ────────────────────────────────────────────
  async function loadItems() {
    const list = document.getElementById('item-list');
    list.innerHTML = `
      <div class="state-message">
        <span class="state-icon">⟳</span>
        <span class="state-text">Loading…</span>
      </div>`;

    try {
      const r = await fetch(`${API}/users/${USER_ID}/open-items`);
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
      allItems = await r.json();
      renderItems();
    } catch (e) {
      list.innerHTML = `
        <div class="state-message">
          <span class="state-icon">⚠</span>
          <span class="state-text error">Could not load items: ${e.message}</span>
        </div>`;
    }
  }

  // ── Classify item urgency ──────────────────────────────────────
  // Parse YYYY-MM-DD without timezone conversion
  function parseDate(str) {
    const [y, m, d] = str.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    dt.setHours(0, 0, 0, 0);
    return dt;
  }

  function classify(item) {
    if (!item.dueDate) return 'no-date';
    const due  = parseDate(item.dueDate);
    const diff = Math.floor((due - TODAY) / 86400000);
    if (diff <= 0) return 'overdue';
    if (diff <= 7) return 'due-soon';
    return 'on-track';
  }

  function formatDue(item, urgency) {
    if (!item.dueDate) return 'no date';
    const due  = parseDate(item.dueDate);
    const diff = Math.floor((due - TODAY) / 86400000);
    if (diff === 0)  return 'due today';
    if (diff === 1)  return 'tomorrow';
    if (diff === -1) return 'yesterday · overdue';
    if (diff < 0)   return `${Math.abs(diff)} days ago · overdue`;
    if (diff <= 7)  return `in ${diff} days`;
    const months = ['Jan','Feb','Mar','Apr','May','Jun',
                    'Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[due.getMonth()]} ${due.getDate()}`;
  }

  // ── Priority label ─────────────────────────────────────────────
  function priorityLabel(p) {
    return { 4:'CRIT', 3:'HIGH', 2:'MED', 1:'LOW' }[p] || 'MED';
  }

  // ── Render ─────────────────────────────────────────────────────
  function renderItems() {
    const groups = {
      overdue:  allItems.filter(i => classify(i) === 'overdue'),
      'due-soon': allItems.filter(i => classify(i) === 'due-soon'),
      'on-track': allItems.filter(i => classify(i) === 'on-track'),
      'no-date':  allItems.filter(i => classify(i) === 'no-date'),
    };

    const overdue  = groups.overdue.length;
    const dueSoon  = groups['due-soon'].length;
    const total    = allItems.length;

    // Update summary cards
    document.getElementById('count-overdue').textContent  = overdue;
    document.getElementById('count-due-soon').textContent = dueSoon;
    document.getElementById('count-open').textContent     = total;

    // Update nav badges
    const overdueB = document.getElementById('nav-overdue-badge');
    if (overdue > 0) {
      overdueB.textContent = overdue;
      overdueB.style.display = '';
    } else {
      overdueB.style.display = 'none';
    }
    const openB = document.getElementById('nav-open-badge');
    if (total > 0) {
      openB.textContent = total;
      openB.style.display = '';
    } else {
      openB.style.display = 'none';
    }

    // Remove alert/warn classes if counts are zero
    document.getElementById('card-overdue').className =
      `summary-card${overdue > 0 ? ' alert' : ''}`;
    document.getElementById('card-due-soon').className =
      `summary-card${dueSoon > 0 ? ' warn' : ''}`;

    if (total === 0) {
      document.getElementById('item-list').innerHTML = `
        <div class="state-message">
          <span class="state-icon">✓</span>
          <span class="state-text">Nothing needs your attention right now.</span>
        </div>`;
      return;
    }

    const groupDefs = [
      { key: 'overdue',   label: 'Overdue',       cls: 'overdue' },
      { key: 'due-soon',  label: 'Due this week',  cls: 'due-soon' },
      { key: 'on-track',  label: 'On track',       cls: 'on-track' },
      { key: 'no-date',   label: 'No due date',    cls: 'no-date' },
    ];

    let html = '';
    let delay = 0;

    for (const def of groupDefs) {
      const items = groups[def.key];
      if (items.length === 0) continue;

      html += `
        <div class="item-group">
          <div class="group-header">
            <span class="group-label ${def.cls}">${def.label}</span>
            <span class="group-count">${items.length} item${items.length !== 1 ? 's' : ''}</span>
          </div>`;

      for (const item of items) {
        const urgency  = def.key;
        const dueText  = formatDue(item, urgency);
        const priLabel = priorityLabel(item.priority);
        const absentiaChip = item.assignedInAbsentia
          ? `<span class="item-absentia">in absentia</span>` : '';

        html += `
          <div class="item-row ${urgency}"
               style="animation-delay:${delay * 0.02}s"
               onclick="openItem('${item.id}','${item.minutesId}')"
               oncontextmenu="showContext(event,'${item.id}','${item.minutesId}')">
            <span class="item-indicator ${urgency}"></span>
            <div class="item-body">
              <span class="item-title">${escHtml(item.title)}</span>
              <div class="item-meta">
                <span class="item-series">${escHtml(item.seriesName)}</span>
                <span class="meta-sep">·</span>
                <span class="item-topic">${escHtml(item.topicTitle)}</span>
                ${absentiaChip ? `<span class="meta-sep">·</span>${absentiaChip}` : ''}
              </div>
            </div>
            <span class="item-priority priority-${item.priority}">${priLabel}</span>
            <span class="item-due ${urgency}">${dueText}</span>
            <div class="item-actions">
              <button class="item-action-btn done"
                      onclick="markDone(event,'${item.id}')">✓ done</button>
              <button class="item-action-btn"
                      onclick="defer(event,'${item.id}')">defer</button>
            </div>
          </div>`;
        delay++;
      }

      html += `</div>`;
    }

    document.getElementById('item-list').innerHTML = html;
  }

  // ── Actions ────────────────────────────────────────────────────
  async function markDone(e, itemId) {
    e.preventDefault(); e.stopPropagation();
    try {
      const r = await fetch(`${API}/action-items/${itemId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'done' })
      });
      if (!r.ok) throw new Error(await r.text());

      // Animate out then reload
      const row = e.target.closest('.item-row');
      if (row) {
        row.style.transition = 'opacity 0.3s';
        row.style.opacity = '0.2';
        setTimeout(() => loadItems(), 320);
      }
    } catch(err) {
      alert('Could not mark done: ' + err.message);
    }
  }

  async function defer(e, itemId) {
    e.preventDefault(); e.stopPropagation();
    try {
      const r = await fetch(`${API}/action-items/${itemId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'deferred' })
      });
      if (!r.ok) throw new Error(await r.text());
      loadItems();
    } catch(err) {
      alert('Could not defer: ' + err.message);
    }
  }

  function openItem(itemId, minutesId) {
    window.location.href = `/app/item?id=${itemId}`;
  }

  // ── Context menu ───────────────────────────────────────────────
  let ctxItemId    = null;
  let ctxMinutesId = null;
  const menu = document.getElementById('context-menu');

  function showContext(e, itemId, minutesId) {
    e.preventDefault(); e.stopPropagation();
    ctxItemId    = itemId;
    ctxMinutesId = minutesId;
    menu.style.left = Math.min(e.clientX, window.innerWidth  - 200) + 'px';
    menu.style.top  = Math.min(e.clientY, window.innerHeight - 260) + 'px';
    menu.classList.add('visible');
  }

  function ctxAction(action) {
    menu.classList.remove('visible');
    switch(action) {
      case 'done':    markDone({ preventDefault:()=>{}, stopPropagation:()=>{},
                        target: { closest: () => null } }, ctxItemId); break;
      case 'defer':   defer({ preventDefault:()=>{}, stopPropagation:()=>{} }, ctxItemId); break;
      case 'open':    openItem(ctxItemId, ctxMinutesId); break;
      case 'meeting': window.location.href = `/app/minutes?id=${ctxMinutesId}`; break;
      case 'note':    alert('Add note — coming soon'); break;
      case 'abandon':
        const note = prompt('Reason for abandoning (required):');
        if (note && note.trim()) abandonItem(ctxItemId, note);
        break;
    }
  }

  async function abandonItem(itemId, note) {
    // Abandon is system-set via minutes abandon — for now alert
    alert('Abandon from attention page — needs design decision on single-item abandon.\nNote: ' + note);
  }

  document.addEventListener('click', () => menu.classList.remove('visible'));
  document.addEventListener('keydown', e => { if (e.key === 'Escape') menu.classList.remove('visible'); });

  // ── Utility ────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
