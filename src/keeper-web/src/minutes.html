<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keeper — Meeting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:           #0e0f11;
      --bg-surface:   #16181c;
      --bg-raised:    #1e2127;
      --bg-hover:     #252830;
      --border:       #2a2d35;
      --border-light: #343840;
      --text-primary:   #e8eaed;
      --text-secondary: #8b909a;
      --text-muted:     #555a66;
      --overdue:      #e05252;
      --overdue-bg:   #1f1214;
      --due-soon:     #e09052;
      --due-soon-bg:  #1a1510;
      --on-track:     #52a882;
      --on-track-bg:  #0f1a15;
      --accent:       #4a9eff;
      --accent-dim:   #1a3a5c;
      --carry-color:  #a67cff;
      --carry-bg:     #1a1530;
      --carry-border: #2a2040;
      --font-sans: 'IBM Plex Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --radius: 4px; --radius-lg: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body { font-family: var(--font-sans); background: var(--bg); color: var(--text-primary); min-height: 100vh; line-height: 1.5; }
    button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
    a { color: inherit; text-decoration: none; }

    .shell { display: grid; grid-template-columns: 220px 1fr; grid-template-rows: 48px 1fr; min-height: 100vh; }

    /* ── Top bar ────────────────────────────────────────────────── */
    .topbar { grid-column: 1/-1; display: flex; align-items: center; padding: 0 20px; background: var(--bg-surface); border-bottom: 1px solid var(--border); gap: 16px; }
    .topbar-logo { font-family: var(--font-mono); font-size: 13px; font-weight: 500; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; }
    .topbar-logo span { color: var(--text-muted); font-weight: 400; }
    .topbar-sep { width: 1px; height: 20px; background: var(--border); }
    .topbar-breadcrumb { display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 12px; }
    .bc-link { color: var(--text-secondary); cursor: pointer; transition: color 0.1s; }
    .bc-link:hover { color: var(--accent); }
    .bc-sep { color: var(--text-muted); }
    .bc-current { color: var(--text-primary); }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .topbar-user { font-size: 12px; color: var(--text-secondary); }
    .topbar-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-dim); border: 1px solid var(--accent); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 11px; color: var(--accent); font-weight: 500; }

    /* ── Sidebar ────────────────────────────────────────────────── */
    .sidebar { background: var(--bg-surface); border-right: 1px solid var(--border); padding: 16px 0; display: flex; flex-direction: column; gap: 4px; }
    .nav-section { padding: 8px 16px 4px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 7px 16px; font-size: 13px; color: var(--text-secondary); cursor: pointer; transition: background 0.1s, color 0.1s; border-left: 2px solid transparent; }
    .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .nav-item.active { color: var(--text-primary); border-left-color: var(--accent); background: var(--bg-hover); }
    .nav-icon { font-size: 14px; width: 16px; text-align: center; flex-shrink: 0; }
    .sidebar-footer { margin-top: auto; padding: 12px 16px; border-top: 1px solid var(--border); }
    .sidebar-footer-text { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); line-height: 1.6; }

    /* ── Main ───────────────────────────────────────────────────── */
    .main { overflow-y: auto; display: flex; flex-direction: column; }

    /* ── Meeting banner ─────────────────────────────────────────── */
    .meeting-banner { padding: 20px 28px 16px; border-bottom: 1px solid var(--border); background: var(--bg-surface); display: flex; flex-direction: column; gap: 12px; }
    .meeting-banner.is-draft { background: #14120a; border-bottom-color: #2a2210; }

    .meeting-nav { display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 11px; }
    .meeting-nav-btn { padding: 3px 10px; border-radius: var(--radius); font-size: 11px; font-family: var(--font-mono); border: 1px solid var(--border); color: var(--text-secondary); background: var(--bg-raised); transition: all 0.1s; }
    .meeting-nav-btn:not(:disabled):hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .meeting-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .meeting-nav-pos { color: var(--text-muted); flex: 1; text-align: center; }

    .meeting-header-row { display: flex; align-items: flex-start; gap: 16px; }
    .meeting-title-block { flex: 1; min-width: 0; }
    .meeting-title { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
    .meeting-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .meeting-date { font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); }
    .series-link { font-family: var(--font-mono); font-size: 11px; color: var(--accent); cursor: pointer; }
    .series-link:hover { opacity: 0.8; }
    .meta-sep { color: var(--border-light); }

    .status-badge { padding: 4px 12px; border-radius: var(--radius); font-family: var(--font-mono); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; flex-shrink: 0; }
    .badge-draft     { background: #1f1810; color: var(--due-soon); border: 1px solid #2e2210; }
    .badge-finalized { background: var(--on-track-bg); color: var(--on-track); border: 1px solid #1a3a28; }
    .badge-abandoned { background: var(--bg-raised); color: var(--text-muted); border: 1px solid var(--border); }
    .badge-readonly  { background: var(--bg-raised); color: var(--text-muted); border: 1px solid var(--border); font-size: 10px; }

    .meeting-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn { padding: 6px 14px; border-radius: var(--radius); font-size: 12px; font-weight: 500; transition: all 0.1s; }
    .btn-ghost { color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-light); }
    .btn-success { background: var(--on-track); color: white; }
    .btn-success:hover { background: #42987a; }
    .btn-danger { color: var(--overdue); border: 1px solid var(--border); }
    .btn-danger:hover { background: var(--overdue-bg); border-color: var(--overdue); }

    .stats-strip { display: flex; gap: 20px; align-items: center; }
    .stat-item { display: flex; align-items: baseline; gap: 5px; }
    .stat-value { font-family: var(--font-mono); font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .stat-value.warn { color: var(--due-soon); }
    .stat-value.alert { color: var(--overdue); }
    .stat-label { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
    .stats-sep { width: 1px; height: 16px; background: var(--border); }

    .attendee-strip { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .attendee-label { font-family: var(--font-mono); font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-right: 4px; }
    .attendee-pill { display: flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 12px; font-size: 12px; }
    .attendee-pill.attended  { background: var(--bg-raised); border: 1px solid var(--border-light); color: var(--text-primary); }
    .attendee-pill.absent    { background: var(--bg); border: 1px solid var(--border); color: var(--text-muted); font-style: italic; }
    .attendee-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .attended .attendee-dot { background: var(--on-track); }
    .absent   .attendee-dot { background: var(--text-muted); }

    .immutable-banner { display: flex; align-items: center; gap: 10px; padding: 8px 14px; background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }

    /* ── Content ────────────────────────────────────────────────── */
    .content { padding: 20px 28px; display: flex; flex-direction: column; gap: 8px; }
    .content-header { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
    .content-title { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
    .content-actions { margin-left: auto; display: flex; gap: 6px; }

    /* ── Topic card ─────────────────────────────────────────────── */
    .topic-card { border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border); transition: border-color 0.15s; animation: fadeIn 0.18s ease both; }
    .topic-card:hover { border-color: var(--border-light); }
    .topic-card.is-skipped { opacity: 0.55; border-style: dashed; }
    .topic-card.is-info    { border-color: #1a2e1e; }

    .topic-header { display: grid; grid-template-columns: auto 1fr auto auto; align-items: center; gap: 12px; padding: 12px 14px; cursor: pointer; transition: background 0.1s; background: var(--bg-surface); }
    .topic-header:hover { background: var(--bg-hover); }
    .topic-card.is-skipped .topic-header { background: var(--bg); }
    .topic-card.is-info    .topic-header { background: #0f1a11; }

    .topic-expand { font-size: 10px; color: var(--text-muted); transition: transform 0.2s; width: 14px; flex-shrink: 0; }
    .topic-card.expanded .topic-expand { transform: rotate(90deg); color: var(--accent); }

    .topic-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .topic-type-badge { padding: 2px 8px; border-radius: 2px; font-family: var(--font-mono); font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; flex-shrink: 0; }
    .type-recurring  { background: var(--carry-bg); color: var(--carry-color); border: 1px solid #2a2040; }
    .type-adhoc      { background: var(--accent-dim); color: var(--accent); border: 1px solid #1a3050; }
    .type-info       { background: var(--on-track-bg); color: var(--on-track); border: 1px solid #1a3a28; }
    .type-skipped    { background: var(--bg-raised); color: var(--text-muted); border: 1px solid var(--border); }

    .topic-title { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .topic-card.is-skipped .topic-title { color: var(--text-muted); }

    .topic-chips { display: flex; gap: 6px; flex-shrink: 0; }
    .chip { font-family: var(--font-mono); font-size: 10px; padding: 2px 7px; border-radius: 2px; white-space: nowrap; }
    .chip-count          { background: var(--bg-raised); color: var(--text-muted); border: 1px solid var(--border); }
    .chip-count.open     { background: var(--bg-raised); color: var(--text-muted); border: 1px solid var(--border); }
    .chip-count.urgent   { background: var(--overdue-bg); color: var(--overdue); border-color: #3a1515; font-weight: 600; }
    .chip-count.due-soon { background: var(--due-soon-bg); color: var(--due-soon); border-color: #3a2a10; font-weight: 600; }

    .topic-title.urgent   { color: var(--overdue); }
    .topic-title.due-soon { color: var(--due-soon); }

    .topic-hover-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.1s; flex-shrink: 0; }
    .topic-header:hover .topic-hover-actions { opacity: 1; }
    .topic-action-btn { padding: 2px 8px; border-radius: var(--radius); font-size: 11px; font-family: var(--font-mono); border: 1px solid var(--border); color: var(--text-secondary); background: var(--bg-raised); transition: all 0.1s; }
    .topic-action-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .topic-body { display: none; border-top: 1px solid var(--border); }
    .topic-card.expanded .topic-body { display: block; }

    /* ── Action item row ────────────────────────────────────────── */
    .action-item { display: grid; grid-template-columns: 20px 1fr auto auto auto; align-items: center; gap: 12px; padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; background: var(--bg); }
    .action-item:last-child { border-bottom: none; }
    .action-item:hover { background: var(--bg-hover); }
    .action-item.is-done { opacity: 0.45; }

    .ai-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; justify-self: center; }
    .ai-dot.open     { background: var(--accent); }
    .ai-dot.done     { background: var(--on-track); }
    .ai-dot.deferred { background: var(--carry-color); }
    .ai-dot.abandoned { background: var(--text-muted); }

    .ai-body { min-width: 0; }
    .ai-title { font-size: 13px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .action-item.is-done .ai-title { text-decoration: line-through; color: var(--text-muted); }
    .ai-meta { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
    .ai-responsible { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
    .ai-due { font-family: var(--font-mono); font-size: 11px; }
    .ai-due.overdue  { color: var(--overdue); font-weight: 500; }
    .ai-due.due-soon { color: var(--due-soon); }
    .ai-due.on-track { color: var(--text-muted); }
    .meta-sep { color: var(--border-light); font-size: 10px; }

    .ai-priority { font-family: var(--font-mono); font-size: 10px; padding: 2px 6px; border-radius: 2px; white-space: nowrap; }
    .priority-4 { background: #2a1010; color: var(--overdue);  border: 1px solid #3a1515; }
    .priority-3 { background: #1f1810; color: var(--due-soon); border: 1px solid #2e2210; }
    .priority-2 { background: var(--bg-raised); color: var(--text-muted); border: 1px solid var(--border); }
    .priority-1 { background: var(--bg-raised); color: var(--text-muted); border: 1px solid var(--border); }

    .ai-status { font-family: var(--font-mono); font-size: 10px; padding: 2px 7px; border-radius: 2px; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
    .ai-status.open     { background: var(--accent-dim); color: var(--accent); border: 1px solid #1a3a5c; }
    .ai-status.done     { background: var(--on-track-bg); color: var(--on-track); border: 1px solid #1a3a28; }
    .ai-status.deferred { background: var(--carry-bg); color: var(--carry-color); border: 1px solid var(--carry-border); }
    .ai-status.abandoned { background: var(--bg-raised); color: var(--text-muted); border: 1px solid var(--border); }

    .ai-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.1s; }
    .action-item:hover .ai-actions { opacity: 1; }
    .ai-action-btn { padding: 2px 8px; border-radius: var(--radius); font-size: 11px; font-family: var(--font-mono); border: 1px solid var(--border); color: var(--text-secondary); background: var(--bg-raised); transition: all 0.1s; }
    .ai-action-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .ai-action-btn.done:hover { border-color: var(--on-track); color: var(--on-track); background: var(--on-track-bg); }

    .add-item-row { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-top: 1px solid var(--border); background: var(--bg); }
    .add-item-input { flex: 1; background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius); padding: 5px 10px; font-size: 13px; font-family: var(--font-sans); color: var(--text-primary); outline: none; transition: border-color 0.1s; }
    .add-item-input:focus { border-color: var(--accent); }
    .add-item-input::placeholder { color: var(--text-muted); }
    .add-item-btn { padding: 5px 12px; border-radius: var(--radius); font-size: 12px; font-family: var(--font-mono); border: 1px solid var(--border); color: var(--text-secondary); background: var(--bg-raised); transition: all 0.1s; }
    .add-item-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    /* ── Context menu ───────────────────────────────────────────── */
    .context-menu { position: fixed; background: var(--bg-raised); border: 1px solid var(--border-light); border-radius: var(--radius-lg); padding: 4px; min-width: 180px; z-index: 1000; box-shadow: 0 8px 24px rgba(0,0,0,0.4); display: none; }
    .context-menu.visible { display: block; }
    .ctx-section { padding: 4px 8px 2px; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
    .ctx-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: var(--radius); font-size: 12px; color: var(--text-secondary); cursor: pointer; transition: background 0.1s, color 0.1s; }
    .ctx-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .ctx-item.destructive { color: var(--overdue); }
    .ctx-item.destructive:hover { background: var(--overdue-bg); }
    .ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }
    .ctx-icon { font-size: 13px; width: 16px; text-align: center; }

    /* ── States ─────────────────────────────────────────────────── */
    .state-message { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 12px; color: var(--text-muted); }
    .state-icon { font-size: 32px; opacity: 0.4; }
    .state-text { font-size: 13px; font-family: var(--font-mono); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

<body>
<div class="shell">

  <header class="topbar">
    <div class="topbar-logo">KEEPER <span>/ docket</span></div>
    <div class="topbar-sep"></div>
    <div class="topbar-breadcrumb">
      <span class="bc-link" onclick="window.location.href='/app/series'">Series</span>
      <span class="bc-sep">/</span>
      <span class="bc-link" id="bc-series" onclick="window.location.href='/app/series'">—</span>
      <span class="bc-sep">/</span>
      <span class="bc-current" id="bc-date">—</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-user">—</span>
      <div class="topbar-avatar" id="topbar-avatar">—</div>
    </div>
  </header>

  <nav class="sidebar">
    <div class="nav-section">Workspace</div>
    <a class="nav-item" href="/app/attention"><span class="nav-icon">⊙</span>My Attention</a>
    <a class="nav-item active" href="/app/series"><span class="nav-icon">◫</span>Series</a>
    <div class="nav-section">Quick Access</div>
    <a class="nav-item" href="/app/attention"><span class="nav-icon">◈</span>All My Items</a>
    <div class="nav-section">Actions</div>
    <a class="nav-item" href="/app/series"><span class="nav-icon">+</span>New Series</a>
    <div class="sidebar-footer">
      <div class="sidebar-footer-text" id="sidebar-status">keeper v0.1.0<br>connecting…</div>
    </div>
  </nav>

  <main class="main" id="main">
    <div class="state-message">
      <span class="state-icon">⟳</span>
      <span class="state-text">Loading…</span>
    </div>
  </main>
</div>

<!-- Item context menu -->
<div class="context-menu" id="item-ctx">
  <div class="ctx-section">Action item</div>
  <div class="ctx-item" onclick="ctxItem('done')"><span class="ctx-icon">✓</span> Mark done</div>
  <div class="ctx-item" onclick="ctxItem('defer')"><span class="ctx-icon">→</span> Defer</div>
  <div class="ctx-item" onclick="ctxItem('open-item')"><span class="ctx-icon">⊞</span> Open item</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item destructive" onclick="ctxItem('abandon')"><span class="ctx-icon">✕</span> Abandon</div>
</div>

<script>
  const API     = '/api';
  const USER_ID = '00000000-0000-0000-0000-000000000001';
  const TODAY   = new Date(); TODAY.setHours(0,0,0,0);

  let minutes    = null;
  let seriesList = [];
  let ctxItemId  = null;

  // ── Boot ───────────────────────────────────────────────────────
  const minutesId = new URLSearchParams(window.location.search).get('id');
  if (!minutesId) {
    showError('No meeting ID provided. <a href="/app/series">Go to Series</a>');
  } else {
    loadUser();
    loadMinutes(minutesId);
  }

  // ── Load user ──────────────────────────────────────────────────
  async function loadUser() {
    try {
      const r = await fetch(`${API}/users/${USER_ID}`);
      if (!r.ok) return;
      const u = await r.json();
      const initials = u.displayName.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
      document.getElementById('topbar-user').textContent   = u.displayName;
      document.getElementById('topbar-avatar').textContent = initials;
      document.getElementById('sidebar-status').innerHTML  = `keeper v0.1.0<br>docket api · connected`;
    } catch { /* silent */ }
  }

  // ── Load minutes ───────────────────────────────────────────────
  async function loadMinutes(id) {
    try {
      const r = await fetch(`${API}/minutes/${id}`);
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
      minutes = await r.json();
      renderPage();
    } catch(e) {
      showError(`Could not load meeting: ${e.message}`);
    }
  }

  // ── Render full page ───────────────────────────────────────────
  function renderPage() {
    const m       = minutes;
    const isDraft = m.status === 'Draft';
    const isFinal = m.status === 'Finalized';
    const dateStr = formatDateShort(m.scheduledFor);
    const relStr  = relativeDate(m.scheduledFor);

    // Breadcrumb
    document.getElementById('bc-series').textContent = '—'; // series name loaded separately
    document.getElementById('bc-date').textContent   = `${dateStr} · ${m.status.toLowerCase()}`;
    document.title = `Keeper — ${dateStr}`;

    // Load series name for breadcrumb
    fetch(`${API}/series/${m.seriesId}`)
      .then(r => r.json())
      .then(s => { document.getElementById('bc-series').textContent = s.name; })
      .catch(() => {});

    // Count stats
    const openItems  = m.topics.flatMap(t => t.actionItems).filter(a => a.status === 'Open').length;
    const totalItems = m.topics.flatMap(t => t.actionItems).length;
    const itemUrgency = openItems > 0 ? 'warn' : 'good';

    // Status badge
    const badgeHtml = isDraft
      ? `<span class="status-badge badge-draft">Draft</span>`
      : isFinal
        ? `<span class="status-badge badge-finalized">Finalized</span>`
        : `<span class="status-badge badge-abandoned">Abandoned</span>`;

    // Actions
    const actionsHtml = isDraft ? `
      <button class="btn btn-ghost btn-danger" onclick="abandonMeeting()">Abandon</button>
      <button class="btn btn-success" onclick="finalizeMeeting()">Finalize meeting</button>
    ` : `<span class="status-badge badge-readonly">⊘ read-only record</span>`;

    // Attendees
    const attendeeHtml = buildAttendeeStrip(m);

    // Nav
    const hasPrev = !!m.previousMinutesId;
    const navHtml = `
      <button class="meeting-nav-btn" ${hasPrev ? '' : 'disabled'}
              onclick="window.location.href='/app/minutes?id=${m.previousMinutesId}'">← prev</button>
      <span class="meeting-nav-pos">${dateStr} · ${m.status.toLowerCase()}</span>
      <button class="meeting-nav-btn" disabled>next →</button>`;

    // Immutability notice for finalized/abandoned
    const immutableHtml = !isDraft ? `
      <div class="immutable-banner">
        <span style="color:var(--on-track)">⊘</span>
        This meeting is finalized. The record is immutable.
        You can add notes to action items but cannot change commitments.
      </div>` : '';

    document.getElementById('main').innerHTML = `
      <div class="meeting-banner ${isDraft ? 'is-draft' : ''}">
        <div class="meeting-nav">${navHtml}</div>
        <div class="meeting-header-row">
          <div class="meeting-title-block">
            <div class="meeting-title">${escHtml(buildMeetingTitle(m))}</div>
            <div class="meeting-meta">
              <span class="meeting-date">${dateStr} · ${relStr}</span>
              <span class="meta-sep">·</span>
              <span class="series-link" onclick="window.location.href='/app/series'">
                loading series…
              </span>
            </div>
          </div>
          ${badgeHtml}
          <div class="meeting-actions">${actionsHtml}</div>
        </div>
        <div class="stats-strip">
          <div class="stat-item">
            <span class="stat-value">${m.topics.length}</span>
            <span class="stat-label">topics</span>
          </div>
          <div class="stats-sep"></div>
          <div class="stat-item">
            <span class="stat-value ${itemUrgency}">${openItems}</span>
            <span class="stat-label">open items</span>
          </div>
          <div class="stats-sep"></div>
          <div class="stat-item">
            <span class="stat-value">${totalItems - openItems}</span>
            <span class="stat-label">resolved</span>
          </div>
        </div>
        ${attendeeHtml}
      </div>

      <div class="content">
        <div class="content-header">
          <span class="content-title">Topics</span>
          <div class="content-actions">
            ${isDraft ? `<button class="btn btn-ghost" onclick="alert('Add topic — not yet wired')">+ Add topic</button>` : `
              <button class="btn btn-ghost" onclick="expandAll()">Expand all</button>
              <button class="btn btn-ghost" onclick="collapseAll()">Collapse all</button>`}
          </div>
        </div>
        ${immutableHtml}
        ${m.topics.map((t, i) => renderTopicCard(t, isDraft, i)).join('')}
        ${m.topics.length === 0 ? `
          <div class="state-message">
            <span class="state-icon">◈</span>
            <span class="state-text">No topics yet.</span>
          </div>` : ''}
      </div>`;

    // Update series link once loaded
    fetch(`${API}/series/${m.seriesId}`)
      .then(r => r.json())
      .then(s => {
        document.querySelectorAll('.series-link').forEach(el => el.textContent = s.name);
      }).catch(() => {});
  }

  // ── Build meeting title ────────────────────────────────────────
  function buildMeetingTitle(m) {
    // No title field yet — derive from series + date
    return `Meeting · ${formatDateShort(m.scheduledFor)}`;
  }

  // ── Build attendee strip ───────────────────────────────────────
  function buildAttendeeStrip(m) {
    const attended = m.attendees || [];
    const absent   = m.absentParticipants || [];
    const total    = attended.length;

    if (total === 0 && absent.length === 0) return '';

    const pills = [
      ...attended.map(a => `
        <span class="attendee-pill attended">
          <span class="attendee-dot"></span>${escHtml(a.user.displayName)}
        </span>`),
      ...absent.map(u => `
        <span class="attendee-pill absent">
          <span class="attendee-dot"></span>${escHtml(u.displayName)}
        </span>`)
    ].join('');

    return `
      <div class="attendee-strip">
        <span class="attendee-label">${total} attending ·</span>
        ${pills}
      </div>`;
  }

  // ── Render topic card ──────────────────────────────────────────
  function renderTopicCard(t, isDraft, index) {
    const type      = t.type.toLowerCase();
    const isSkipped = t.isSkipped;
    const isInfo    = type === 'info';
    const openItems  = t.actionItems.filter(a => a.status === 'Open');
    const openCount  = openItems.length;
    const totalCount = t.actionItems.length;

    // Topic urgency = most critical open item
    let topicUrgency = 'none';
    for (const a of openItems) {
      const u = classifyDue(a.dueDate);
      if (u === 'overdue')                              { topicUrgency = 'urgent';   break; }
      if (u === 'due-soon' && topicUrgency !== 'urgent') topicUrgency = 'due-soon';
    }
    const titleUrgencyClass = topicUrgency === 'urgent' ? 'urgent'
                            : topicUrgency === 'due-soon' ? 'due-soon' : '';
    const chipUrgencyClass  = topicUrgency === 'urgent' ? 'urgent'
                            : topicUrgency === 'due-soon' ? 'due-soon'
                            : openCount > 0 ? 'open' : '';

    const typeLabel = { recurring: 'Recurring', adhoc: 'Discussion', info: 'Info', skipped: 'Skipped' }[type] || type;
    const typeClass = `type-${type}`;

    const itemChip = totalCount > 0
      ? `<span class="chip chip-count ${chipUrgencyClass}">${openCount > 0 ? openCount + ' open' : totalCount + ' resolved'}</span>`
      : `<span class="chip chip-count">no actions</span>`;

    const cardClasses = ['topic-card', isSkipped ? 'is-skipped' : '', isInfo ? 'is-info' : ''].filter(Boolean).join(' ');

    const hoverActions = isDraft && !isSkipped ? `
      <div class="topic-hover-actions">
        <button class="topic-action-btn" onclick="event.stopPropagation();alert('Add item — not yet wired')">+ item</button>
      </div>` : `<div class="topic-hover-actions"></div>`;

    const body = isSkipped
      ? `<div style="padding:10px 14px;font-family:var(--font-mono);font-size:12px;color:var(--text-muted)">
           Skipped — not discussed this meeting.
         </div>`
      : t.actionItems.map(a => renderActionItem(a, isDraft)).join('') +
        (isDraft ? `<div class="add-item-row">
          <input class="add-item-input" placeholder="Add action item…">
          <button class="add-item-btn">+ add</button>
        </div>` : '');

    return `
      <div class="${cardClasses}" id="tc-${t.id}" style="animation-delay:${index * 0.04}s">
        <div class="topic-header" onclick="toggleTopic('${t.id}')"
             oncontextmenu="showTopicCtx(event,'${t.id}')">
          <span class="topic-expand">▶</span>
          <div class="topic-left">
            <span class="topic-type-badge ${typeClass}">${typeLabel}</span>
            <span class="topic-title ${titleUrgencyClass}">${escHtml(t.title)}</span>
          </div>
          <div class="topic-chips">${itemChip}</div>
          ${hoverActions}
        </div>
        <div class="topic-body" id="tb-${t.id}">${body}</div>
      </div>`;
  }

  // ── Render action item ─────────────────────────────────────────
  function renderActionItem(a, isDraft) {
    const status   = a.status.toLowerCase();
    const urgency  = classifyDue(a.dueDate);
    const dueText  = formatDue(a.dueDate);
    const priLabel = { 4:'CRIT', 3:'HIGH', 2:'MED', 1:'LOW' }[a.priority] || 'MED';
    const isDone   = status === 'done';

    const actions = isDraft ? `
      <button class="ai-action-btn done"
              onclick="markDone(event,'${a.id}')">✓ done</button>
      <button class="ai-action-btn"
              onclick="deferItem(event,'${a.id}')">defer</button>
    ` : `
      <button class="ai-action-btn"
              onclick="openItem(event,'${a.id}')">history</button>
    `;

    return `
      <div class="action-item ${isDone ? 'is-done' : ''}"
           onclick="openItem(null,'${a.id}')"
           oncontextmenu="showItemCtx(event,'${a.id}')">
        <span class="ai-dot ${status}"></span>
        <div class="ai-body">
          <div class="ai-title">${escHtml(a.title)}</div>
          <div class="ai-meta">
            <span class="ai-responsible">${escHtml(resolveResponsible(a.responsibleId))}</span>
            ${a.dueDate ? `<span class="meta-sep">·</span>
            <span class="ai-due ${urgency}">${dueText}</span>` : ''}
          </div>
        </div>
        <span class="ai-priority priority-${a.priority}">${priLabel}</span>
        <span class="ai-status ${status}">${a.status}</span>
        <div class="ai-actions">${actions}</div>
      </div>`;
  }

  // ── Responsible name resolution (stub — needs users endpoint) ──
  function resolveResponsible(userId) {
    if (userId === USER_ID) return 'Dev User (Stub)';
    return userId ? userId.slice(0, 8) + '…' : 'unassigned';
  }

  // ── Topic expand/collapse ──────────────────────────────────────
  function toggleTopic(topicId) {
    document.getElementById(`tc-${topicId}`).classList.toggle('expanded');
  }
  function expandAll() {
    document.querySelectorAll('.topic-card').forEach(c => c.classList.add('expanded'));
  }
  function collapseAll() {
    document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('expanded'));
  }

  // ── Meeting actions ────────────────────────────────────────────
  async function finalizeMeeting() {
    if (!confirm('Finalize this meeting? The record will be immutable.')) return;
    try {
      const r = await fetch(`${API}/minutes/${minutesId}/finalize`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ notifyResponsibles: false, notifyAll: false })
      });
      if (!r.ok) {
        const err = await r.json();
        if (r.status === 409 && err.blockingItemIds) {
          alert(`Cannot finalize — ${err.blockingItemIds.length} unresolved item(s) on non-recurring topics must be resolved first.`);
        } else {
          alert(`Error: ${err.title || r.statusText}`);
        }
        return;
      }
      loadMinutes(minutesId);
    } catch(e) {
      alert('Could not finalize: ' + e.message);
    }
  }

  async function abandonMeeting() {
    const note = prompt('Reason for abandoning (required):');
    if (!note || !note.trim()) return;
    try {
      const r = await fetch(`${API}/minutes/${minutesId}/abandon`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ note: note.trim() })
      });
      if (!r.ok) throw new Error(await r.text());
      loadMinutes(minutesId);
    } catch(e) {
      alert('Could not abandon: ' + e.message);
    }
  }

  // ── Item actions ───────────────────────────────────────────────
  async function markDone(e, itemId) {
    e.preventDefault(); e.stopPropagation();
    try {
      const r = await fetch(`${API}/action-items/${itemId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'done' })
      });
      if (!r.ok) throw new Error(await r.text());
      loadMinutes(minutesId);
    } catch(e) {
      alert('Could not mark done: ' + e.message);
    }
  }

  async function deferItem(e, itemId) {
    e.preventDefault(); e.stopPropagation();
    try {
      const r = await fetch(`${API}/action-items/${itemId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'deferred' })
      });
      if (!r.ok) throw new Error(await r.text());
      loadMinutes(minutesId);
    } catch(e) {
      alert('Could not defer: ' + e.message);
    }
  }

  function openItem(e, itemId) {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    window.location.href = `/app/item?id=${itemId}`;
  }

  // ── Context menus ──────────────────────────────────────────────
  const itemCtx = document.getElementById('item-ctx');

  function hideMenus() { itemCtx.classList.remove('visible'); }

  function showTopicCtx(e, topicId) {
    e.preventDefault(); e.stopPropagation();
    hideMenus();
    alert(`Topic context menu — not yet wired for topic ${topicId}`);
  }

  function showItemCtx(e, itemId) {
    e.preventDefault(); e.stopPropagation();
    ctxItemId = itemId; hideMenus();
    itemCtx.style.left = Math.min(e.clientX, window.innerWidth  - 200) + 'px';
    itemCtx.style.top  = Math.min(e.clientY, window.innerHeight - 200) + 'px';
    itemCtx.classList.add('visible');
  }

  function ctxItem(action) {
    hideMenus();
    switch(action) {
      case 'done':      markDone({ preventDefault:()=>{}, stopPropagation:()=>{} }, ctxItemId); break;
      case 'defer':     deferItem({ preventDefault:()=>{}, stopPropagation:()=>{} }, ctxItemId); break;
      case 'open-item': openItem(null, ctxItemId); break;
      case 'abandon':
        const note = prompt('Reason for abandoning (required):');
        if (note && note.trim()) alert(`Abandon ${ctxItemId} — not yet wired`);
        break;
    }
  }

  document.addEventListener('click', hideMenus);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') hideMenus(); });

  // ── Date utilities ─────────────────────────────────────────────
  function parseLocalDate(str) {
    if (!str) return null;
    // ISO datetime string — use as-is
    if (str.includes('T')) return new Date(str);
    // Date-only string — parse without UTC shift
    const [y,m,d] = str.split('-').map(Number);
    const dt = new Date(y, m-1, d); dt.setHours(0,0,0,0); return dt;
  }

  function classifyDue(dateStr) {
    if (!dateStr) return 'no-date';
    const due  = parseLocalDate(dateStr);
    due.setHours(0,0,0,0);
    const diff = Math.floor((due - TODAY) / 86400000);
    if (diff <= 0) return 'overdue';
    if (diff <= 7) return 'due-soon';
    return 'on-track';
  }

  function formatDue(dateStr) {
    if (!dateStr) return '';
    const due  = parseLocalDate(dateStr);
    due.setHours(0,0,0,0);
    const diff = Math.floor((due - TODAY) / 86400000);
    if (diff === 0)  return 'due today';
    if (diff === 1)  return 'tomorrow';
    if (diff === -1) return 'yesterday · overdue';
    if (diff < 0)   return `${Math.abs(diff)} days ago · overdue`;
    if (diff <= 7)  return `in ${diff} days`;
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[due.getMonth()]} ${due.getDate()}`;
  }

  function formatDateShort(str) {
    const d = new Date(str);
    const days   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  }

  function relativeDate(str) {
    const d = new Date(str); d.setHours(0,0,0,0);
    const diff = Math.floor((d - TODAY) / 86400000);
    if (diff === 0)  return 'today';
    if (diff === -1) return 'yesterday';
    if (diff < 0)   return `${Math.abs(diff)} days ago`;
    if (diff === 1) return 'tomorrow';
    return `in ${diff} days`;
  }

  function showError(msg) {
    document.getElementById('main').innerHTML = `
      <div class="state-message">
        <span class="state-icon">⚠</span>
        <span class="state-text" style="color:var(--overdue)">${msg}</span>
      </div>`;
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
